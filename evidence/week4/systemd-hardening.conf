[Service]
# Filesystem hardening
ProtectHome=read-only
ReadWritePaths=/home/jun/.openclaw /home/jun/openclaw-sandbox /tmp/openclaw /var/run/docker.sock
ProtectSystem=strict

# Process hardening
NoNewPrivileges=yes

# Network family restriction (AF_NETLINK is required for networkInterfaces() queries)
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK
